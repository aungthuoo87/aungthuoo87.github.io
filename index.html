<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #007bff;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 ဂုဏ်ယူပါတယ် 🎉</h1>
        <p>သင့်ရဲ့ Domain နှင့် GitHub Pages Hosting ချိတ်ဆက်မှု<br>အောင်မြင်စွာ ပြီးဆုံးသွားပါပြီ။</p>
        <div class="badge">Status: Active & Online</div>
        <p style="margin-top: 30px; font-size: 14px; color: #777;">
            Powered by DigitalPlat, Cloudflare & GitHub Pages
        </p>
    </div>

</body>
</html>
